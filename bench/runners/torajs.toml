# torajs production AOT path: tr → SSA IR → Inkwell → LLVM 22 → object → cc.
# Replaced the previous `torajs-aot` (wasm-via-C) row in P3.7 — wasm-via-C is
# gone; this is the canonical `torajs` identity on the bench scoreboard.
name = "torajs"
detect = "{workspace}/target/release/tr --version"
src_filename = "main.tora.ts"
compile = "{workspace}/target/release/tr build {src} -o {out}"
run = "{out}"
