# bench latest-stable policy (B-BENCH-VER).
#
# Bench fails fast if any runner's detected version < `floor`. `hint` is
# the one-line fix instruction printed to the user on failure. Update this
# file when bumping comparator versions; document the bump reason in the
# commit message.
#
# Conventions:
# - `floor` is semver `major.minor.patch` — parsed by extracting the first
#   N.N.N triple from the detect command's output, so it matches whether the
#   runtime prints `v26.1.0` (node), `1.3.14` (bun), `go version go1.25.6 ...`
#   (go), or `rustc 1.95.0 (...)` (rust).
# - In-tree runners (`torajs`, `torajs-run`) have no entry — their version
#   IS the git HEAD, not a downloaded toolchain.
# - The runner key matches `Runner.name` from bench/runners/<name>.toml.
#
# Last review: 2026-05-20 (takagi).

[runners.node-v8]
floor = "26.0.0"
hint  = "nvm install node && nvm use node"

[runners.bun-jsc]
floor = "1.3.0"
hint  = "bun upgrade"

[runners.bun-aot]
floor = "1.3.0"
hint  = "bun upgrade"

[runners.go]
floor = "1.25.0"
hint  = "brew upgrade go  (or `asdf install golang latest && asdf global golang latest`)"

[runners.rust]
floor = "1.95.0"
hint  = "rustup update stable"

[runners.python]
floor = "3.13.0"
hint  = "brew upgrade python@3.13  (or pyenv install -s 3.13.0 && pyenv global 3.13.0)"
