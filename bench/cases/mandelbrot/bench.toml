runs = 5
warmup = 1

# 200x200 grid × max_iter=1000 yields 15383188 iterations summed for the 5
# straightforward (non-FMA) implementations (rust, bun, node, python,
# torajs-aot via clang). Go's gc compiler auto-fuses on ARM64 (FMADDD),
# producing 15382891 — same algorithm, different floating-point precision.
# 500 absolute tolerance is enough to admit FMA-induced drift while still
# rejecting actual algorithmic divergence (e.g. a sign flip at one cell
# would drift by ~max_iter = 1000).
tolerance = 500
