runs = 5
warmup = 2

# 100K iterations of throw + catch in a single fn. Tests M4 throw cost:
# torajs's globals-based throw (write throw_active=1 + value, ret
# sentinel, caller checks flag, br to catch, take value) vs rust's
# DWARF EH unwind (`panic::catch_unwind`), go's panic+defer+recover,
# bun/node's setjmp-style throw.
torajs_opt = "O3"
