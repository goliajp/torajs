# torajs uses a project-private target dir on the INTERNAL disk.
#
# Rationale: cargo's small-file random IO is 2-3x slower on the
# external INTEL2T volume (see ~/.claude-shared/global/cargo-target-dir.md),
# and torajs is the flagship project with extreme build/perf
# requirements. A project-private target also removes shared-cache
# contention with other workspaces' parallel builds and isolates
# `cargo clean`.
#
# This project config overrides the home ~/.cargo/config.toml's
# INTEL2T target-dir (project config wins over home config). The
# ~/.local/bin/cargo wrapper additionally honors the sibling
# `.cargo-target-local` marker and leaves CARGO_TARGET_DIR unset so
# this value takes effect (an env var would otherwise override it).
[build]
target-dir = "/Users/doracawl/workspace/goliajp/torajs/target"

# B1b (2026-05-24) — silence `linker_messages` lint on macOS hosts.
# nightly's rustc surfaces ld's "building for macOS-11.0 but linking
# with libLLVM.dylib built for newer 26.0" as a `#[warn(linker_messages)]`
# diagnostic; the actual ABI is compatible (LLVM has a stable C ABI
# across these versions), so it's noise that defeats the CLAUDE.md
# "0 warning" pre-flight gate. The real fix is to bump the macOS
# deployment target to match Homebrew LLVM's, but doing that needs
# a target/cleanup audit — tracked as L3b follow-up.
[target.'cfg(target_os = "macos")']
rustflags = ["-A", "linker_messages"]

# polish A4 (2026-05-24) — `cargo build --release` (and tr-cli
# release builds in particular) get `-Z build-std` + `panic =
# "immediate-abort"` via env vars, NOT via this config file.
# Putting build-std here would force-rebuild std on every
# `cargo test` too, which breaks the test harness's catch_unwind
# (cargo test needs panic=unwind in panic_unwind, immediate-abort
# refuses). Env-var gating keeps the size win isolated to release
# builds. See `scripts/release-build.sh` (TODO) or use:
#
#   CARGO_UNSTABLE_BUILD_STD=core,alloc,std,panic_abort \
#   CARGO_UNSTABLE_UNSTABLE_OPTIONS=true \
#   cargo build --release --target aarch64-apple-darwin
#
# The `--target` arg is required to trigger build-std (without it
# cargo uses host-precompiled std).
